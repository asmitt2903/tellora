<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | MindForum</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="notifications.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo" onclick="window.location.href='home.html'">MindForum</h1>
            
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search MindForum...">
            </div>

            <nav class="nav-links">
                <a href="home.html"><i class="fas fa-compass"></i> Explore</a>
                <a href="#"><i class="fas fa-question-circle"></i> Questions</a>
                <a href="#"><i class="fas fa-layer-group"></i> Spaces</a>
                <a href="#"><i class="fas fa-bookmark"></i> Bookmarks</a>
                <a href="ai-assistant.html"><i class="fas fa-robot"></i> AI Assistant</a>
                
            </nav>

            <div class="nav-actions">
                <div class="notification-wrapper active">
                    <i class="fas fa-bell notif-icon"></i>
                    <span class="notification-dot hidden" id="notifDot"></span>
                </div>
                <button class="btn-ask" onclick="window.location.href='home.html'">Ask Question</button>
                <div class="profile-section">
                    <div class="avatar-container" id="profileTrigger">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <!-- Left Sidebar (Hidden or reduced for Notifications if needed, but keeping layout for consistency) -->
        <aside class="sidebar-left">
            <div class="sidebar-section">
                <ul class="space-list">
                    <li onclick="window.location.href='home.html'"><i class="fas fa-home"></i> Home</li>
                    <li><i class="fas fa-brain"></i> Psychology</li>
                    <li><i class="fas fa-book-open"></i> Philosophy</li>
                    <li><i class="fas fa-microchip"></i> Technology</li>
                </ul>
            </div>
        </aside>

        <!-- Notifications Feed -->
        <section class="feed-container">
            <div class="notifications-header">
                <div class="header-text">
                    <h1>Notifications</h1>
                    <p>Stay updated with your intellectual community</p>
                    <button class="btn-mark-read" onclick="markAllAsRead()">
                        <i class="fas fa-check-double"></i> Mark all as read
                    </button>
                </div>
                <div class="notif-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="mentions">Mentions</button>
                    <button class="filter-btn" data-filter="upvotes">Upvotes</button>
                </div>
            </div>

            <div id="notificationsList" class="notifications-list">
                <!-- Notifications will be loaded here -->
                <div class="loading-state">
                    <i class="fas fa-circle-notch fa-spin"></i> Loading notifications...
                </div>
            </div>

            <button class="btn-load-more" id="loadMoreNotifs">Show older notifications</button>
        </section>

        <!-- Right Side Panel (Optional or useful info) -->
        <aside class="sidebar-right">
             <!-- Placeholder for space info or suggested thinkers -->
        </aside>
    </main>

    <script src="home.js"></script>
    <script src="notifications.js"></script>
</body>
</html>
