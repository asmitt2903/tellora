<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Tellora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="messages.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo" onclick="window.location.href='/home'">Tellora</h1>
            <nav class="nav-links">
                <a href="/home"><i class="fas fa-compass"></i> Explore</a>
                <a href="/create-story"><i class="fas fa-pen-fancy"></i> Create Story</a>
                <a href="/messages" class="active"><i class="fas fa-comments"></i> Messages</a>
            </nav>
            <div class="nav-actions">
                <div class="notification-wrapper" onclick="window.location.href='/notifications'">
                    <i class="fas fa-bell notif-icon"></i>
                    <span class="notification-dot hidden" id="notifDot"></span>
                </div>
                <div class="avatar-container" id="navAvatarContainer" style="cursor:pointer"></div>
            </div>
        </div>
    </header>

    <!-- Chat Layout -->
    <main class="chat-layout">

        <!-- Left Sidebar: Conversation List -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h2>Messages</h2>
                <button class="new-chat-btn" id="newChatBtn" title="New Conversation">
                    <i class="fas fa-edit"></i>
                </button>
            </div>
            <div class="sidebar-search">
                <i class="fas fa-search"></i>
                <input type="text" id="chatSearchInput" placeholder="Search conversations...">
            </div>
            <div class="chat-list" id="chatListContainer">
                <div class="loading-state"><i class="fas fa-circle-notch fa-spin"></i> Loading...</div>
            </div>
        </aside>

        <!-- Right: Active Chat -->
        <section class="active-chat-area">

            <!-- Empty / No chat selected state -->
            <div class="no-chat-selected" id="noChatState">
                <div class="empty-icon-wrap"><i class="fas fa-comments"></i></div>
                <h3>Your Messages</h3>
                <p>Connect with fellow storytellers and authors.</p>
                <button class="btn-new-message" id="startChatBtn">
                    <i class="fas fa-plus"></i> New Message
                </button>
            </div>

            <!-- Chat window (hidden until a chat is selected) -->
            <div id="chatContent" class="chat-content hidden">
                <!-- Header -->
                <div class="chat-header">
                    <div class="chat-user-info" id="chatHeaderInfo" onclick="viewChatProfile()"></div>
                    <div class="chat-header-actions">
                        <div class="header-action-btn" onclick="viewChatProfile()" title="View Profile">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div class="chat-history" id="chatHistoryFeed"></div>

                <!-- Typing indicator -->
                <div class="typing-indicator hidden" id="typingIndicator">
                    <span></span><span></span><span></span>
                </div>

                <!-- Input Bar -->
                <div class="chat-input-wrapper">
                    <div class="chat-input-box">
                        <input type="text" id="messageInput" placeholder="Write a message..." autocomplete="off">
                    </div>
                    <button class="send-btn" id="sendMessageBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

        </section>
    </main>

    <!-- New Chat Modal -->
    <div class="msg-modal" id="newChatModal">
        <div class="msg-modal-content">
            <div class="msg-modal-header">
                <h3><i class="fas fa-edit"></i> New Message</h3>
                <button class="msg-modal-close" onclick="closeNewChatModal()">&times;</button>
            </div>
            <div class="msg-modal-body">
                <div class="user-search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearchInput" placeholder="Search users by name..." autocomplete="off">
                </div>
                <div id="userSearchResults" class="user-search-results">
                    <p class="search-hint">Type at least 2 characters to search...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="messages.js"></script>
</body>
</html>
