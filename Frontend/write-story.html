<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellora | Write Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <style>
        .create-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .create-header {
            margin-bottom: 25px;
            text-align: center;
        }
        .create-form .form-group {
            margin-bottom: 20px;
        }
        .create-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .create-form input, .create-form textarea, .create-form select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 15px;
        }
        .create-form textarea {
            height: 150px;
            resize: vertical;
        }
        .btn-action {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-action:hover {
            background: var(--primary-hover);
        }
        .btn-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo" onclick="window.location.href='home.html'">Tellora</h1>
            
            <nav class="nav-links">
                <a href="home.html"><i class="fas fa-compass"></i> Explore</a>
                <a href="create-story.html"><i class="fas fa-robot"></i> Create Story</a>
                <a href="write-story.html" class="active"><i class="fas fa-pen-nib"></i> Write Story</a>
            </nav>

            <div class="nav-actions">
                <div class="profile-section">
                    <div class="avatar-container" id="profileTrigger" onclick="window.location.href='profile.html'">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-layout" style="display:block;">
        <div class="create-container">
            <div class="create-header">
                <h2><i class="fas fa-pen-nib"></i> Write Your Story</h2>
                <p>Share your imagination with the world.</p>
            </div>
            
            <form class="create-form" id="storyForm">
                <div class="form-group">
                    <label>Story Title</label>
                    <input type="text" id="titleInput" placeholder="Enter a catchy title..." required>
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <select id="genreSelect">
                        <option value="Fantasy">Fantasy</option>
                        <option value="Science Fiction">Science Fiction</option>
                        <option value="Mystery">Mystery</option>
                        <option value="Romance">Romance</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Story Description (Brief)</label>
                    <textarea id="descriptionInput" style="height: 80px;" placeholder="What is this story about?"></textarea>
                </div>
                <div class="form-group">
                    <label>Story Content</label>
                    <textarea id="contentInput" placeholder="Once upon a time..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Cover Image (Optional)</label>
                    <input type="file" id="coverImageInput" accept="image/*">
                </div>
                <button type="submit" class="btn-action" id="publishBtn">
                    <i class="fas fa-paper-plane"></i> Publish Story
                </button>
            </form>
        </div>
    </main>

    <script src="write-story.js"></script>
</body>
</html>
